changelog:
  exclude:
    labels:
      - ignore-for-release
      - ci
      - docs
      - test
    authors:
      - octocat
  categories:
    - title: "🚀 New Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
        - bugfix
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking-change
    - title: "📦 Dependency Updates"
      labels:
        - dependencies
    - title: "🔧 Maintenance"
      labels:
        - maintenance
        - chore
